<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${title} ? ${title} + ' | The Digital Curator' : 'The Digital Curator'">The Digital Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet" />
    <style>
        body { font-family: Inter, sans-serif; background: #f6f8ff; }
        .font-display { font-family: "Space Grotesk", sans-serif; }
        .panel { border: 1px solid #d8e1ef; border-radius: 16px; background: #fff; }
    </style>
</head>
<body class="min-h-screen text-slate-900">
<header th:if="${user}" class="sticky top-0 z-20 border-b border-slate-200/80 bg-white/90 backdrop-blur">
    <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-6 lg:px-8">
        <a href="/" class="font-display text-lg font-bold tracking-tight">The Digital Curator</a>
        <nav class="flex flex-wrap items-center gap-2 text-sm font-semibold">
            <a th:if="${user.role.name() == 'ADMIN'}" href="/admin/dashboard" class="rounded-full px-3 py-1.5 text-slate-600 hover:bg-slate-100">Dashboard</a>
            <a th:if="${user.role.name() == 'SELLER'}" href="/seller/dashboard" class="rounded-full px-3 py-1.5 text-slate-600 hover:bg-slate-100">Dashboard</a>
            <a th:if="${user.role.name() == 'BUYER'}" href="/buyer/dashboard" class="rounded-full px-3 py-1.5 text-slate-600 hover:bg-slate-100">Dashboard</a>
            <a href="/profile" class="rounded-full px-3 py-1.5 text-slate-600 hover:bg-slate-100">Profile</a>
            <a href="/logout" class="rounded-full px-3 py-1.5 text-rose-600 hover:bg-rose-50">Logout</a>
        </nav>
    </div>
</header>

<section th:if="${success != null or error != null}" class="mx-auto mt-4 max-w-7xl px-4 sm:px-6 lg:px-8">
    <div th:if="${success}" class="panel border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-800" th:text="${success}"></div>
    <div th:if="${error}" class="panel border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-800" th:text="${error}"></div>
</section>

<main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8" th:fragment="content"></main>

<footer class="mt-10 border-t border-slate-200 bg-white/80 py-4 text-center text-xs text-slate-500">
    The Digital Curator
</footer>
</body>
</html>
