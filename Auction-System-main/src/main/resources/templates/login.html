<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | The Digital Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: Inter, sans-serif;
            background:
                radial-gradient(circle at 7% -10%, #dbeafe 0%, #dbeafe00 42%),
                radial-gradient(circle at 95% -15%, #a7f3d0 0%, #a7f3d000 38%),
                #f5f8ff;
        }
        .font-display { font-family: "Space Grotesk", sans-serif; }
    </style>
</head>
<body class="min-h-screen text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-5xl items-center px-4 py-10 sm:px-6 lg:px-8">
        <section class="grid w-full overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-xl lg:grid-cols-2">
            <div class="hidden bg-gradient-to-br from-blue-700 to-sky-500 p-10 text-white lg:block">
                <p class="font-display text-3xl font-bold tracking-tight">The Digital Curator</p>
                <h1 class="mt-8 font-display text-4xl font-bold leading-tight">Bid fast. Sell smart. Win confidently.</h1>
                <p class="mt-4 text-sm text-blue-50">Secure real-time auctions for buyers, sellers, and platform admins.</p>
            </div>

            <div class="p-8 sm:p-10">
                <h2 class="font-display text-3xl font-bold tracking-tight">Welcome Back</h2>
                <p class="mt-1 text-sm text-slate-500">Sign in to continue to The Digital Curator.</p>

                <div th:if="${success}" class="mt-5 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-800" th:text="${success}"></div>
                <div th:if="${error}" class="mt-5 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-800" th:text="${error}"></div>

                <form method="post" action="/login" class="mt-6 space-y-4">
                    <div>
                        <label for="username" class="mb-1 block text-sm font-semibold text-slate-700">Username</label>
                        <input id="username" name="username" type="text" required="required" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                    </div>
                    <div>
                        <label for="password" class="mb-1 block text-sm font-semibold text-slate-700">Password</label>
                        <input id="password" name="password" type="password" required="required" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                    </div>
                    <button type="submit" class="w-full rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-700">Sign In</button>
                </form>

                <p class="mt-5 text-center text-sm text-slate-600">
                    No account yet?
                    <a href="/register" class="font-semibold text-blue-700 hover:underline">Create one</a>
                </p>
            </div>
        </section>
    </main>
</body>
</html>
