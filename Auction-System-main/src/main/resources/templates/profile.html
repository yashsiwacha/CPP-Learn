<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | The Digital Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: Inter, sans-serif;
            background:
                radial-gradient(circle at 6% -10%, #dbeafe 0%, #dbeafe00 40%),
                radial-gradient(circle at 96% -10%, #fbcfe8 0%, #fbcfe800 35%),
                #f5f8ff;
        }
        .font-display { font-family: "Space Grotesk", sans-serif; }
        .panel { border: 1px solid #d8e1ef; border-radius: 16px; background: #fff; }
    </style>
</head>
<body class="min-h-screen text-slate-900">
<header class="sticky top-0 z-20 border-b border-slate-200/80 bg-white/85 backdrop-blur">
    <div class="mx-auto flex max-w-7xl flex-wrap items-center justify-between gap-3 px-4 py-3 sm:px-6 lg:px-8">
        <a class="font-display text-lg font-bold tracking-tight text-slate-900" th:href="${user.role.name() == 'BUYER'} ? '/buyer/dashboard' : (${user.role.name() == 'SELLER'} ? '/seller/dashboard' : '/admin/dashboard')">The Digital Curator</a>
        <nav class="flex flex-wrap items-center gap-2 text-sm font-semibold">
            <a th:if="${user.role.name() == 'BUYER'}" href="/buyer/dashboard" class="rounded-full px-3 py-1.5 text-slate-600 hover:bg-slate-100">Dashboard</a>
            <a th:if="${user.role.name() == 'SELLER'}" href="/seller/dashboard" class="rounded-full px-3 py-1.5 text-slate-600 hover:bg-slate-100">Dashboard</a>
            <a th:if="${user.role.name() == 'ADMIN'}" href="/admin/dashboard" class="rounded-full px-3 py-1.5 text-slate-600 hover:bg-slate-100">Dashboard</a>
            <a href="/profile" class="rounded-full bg-blue-100 px-3 py-1.5 text-blue-700">Profile</a>
            <a href="/logout" class="rounded-full px-3 py-1.5 text-rose-600 hover:bg-rose-50">Logout</a>
        </nav>
    </div>
</header>

<main class="mx-auto max-w-7xl px-4 py-8 sm:px-6 lg:px-8">
    <section th:if="${success != null or error != null}" class="mb-6 space-y-3">
        <div th:if="${success}" class="panel border-emerald-200 bg-emerald-50 px-4 py-3 text-sm font-semibold text-emerald-800" th:text="${success}"></div>
        <div th:if="${error}" class="panel border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-800" th:text="${error}"></div>
    </section>

    <section class="mb-6">
        <h1 class="font-display text-3xl font-bold tracking-tight">Account Profile</h1>
        <p class="mt-1 text-sm text-slate-600">Manage your personal details and credential security.</p>
    </section>

    <section class="grid gap-6 lg:grid-cols-2">
        <article class="panel p-5">
            <h2 class="font-display text-xl font-bold">Edit Details</h2>
            <form method="post" action="/profile/update" class="mt-4 space-y-4">
                <div>
                    <label for="fullName" class="mb-1 block text-sm font-semibold text-slate-700">Full Name</label>
                    <input id="fullName" name="fullName" type="text" required="required" th:value="${user.fullName}" class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <div>
                    <label for="email" class="mb-1 block text-sm font-semibold text-slate-700">Email</label>
                    <input id="email" name="email" type="email" required="required" th:value="${user.email}" class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <div>
                    <label for="phoneNumber" class="mb-1 block text-sm font-semibold text-slate-700">Phone Number</label>
                    <input id="phoneNumber" name="phoneNumber" type="tel" th:value="${user.phoneNumber}" class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <button type="submit" class="rounded-xl bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700">Save Profile</button>
            </form>
        </article>

        <article class="panel p-5">
            <h2 class="font-display text-xl font-bold">Account Info</h2>
            <dl class="mt-4 space-y-2 text-sm">
                <div class="flex justify-between gap-3"><dt class="font-semibold text-slate-600">Username</dt><dd th:text="${user.username}">username</dd></div>
                <div class="flex justify-between gap-3"><dt class="font-semibold text-slate-600">Role</dt><dd th:text="${user.role}">ROLE</dd></div>
                <div class="flex justify-between gap-3"><dt class="font-semibold text-slate-600">Status</dt><dd th:text="${user.isActive} ? 'Active' : 'Inactive'">Active</dd></div>
                <div class="flex justify-between gap-3"><dt class="font-semibold text-slate-600">Email</dt><dd th:text="${user.email}">email</dd></div>
                <div class="flex justify-between gap-3"><dt class="font-semibold text-slate-600">Phone</dt><dd th:text="${user.phoneNumber ?: 'Not provided'}">phone</dd></div>
            </dl>

            <hr class="my-5 border-slate-200" />

            <h3 class="font-display text-lg font-bold">Change Password</h3>
            <form method="post" action="/profile/change-password" class="mt-4 space-y-3">
                <div>
                    <label for="oldPassword" class="mb-1 block text-sm font-semibold text-slate-700">Current Password</label>
                    <input id="oldPassword" name="oldPassword" type="password" required="required" class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <div>
                    <label for="newPassword" class="mb-1 block text-sm font-semibold text-slate-700">New Password</label>
                    <input id="newPassword" name="newPassword" type="password" required="required" class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <div>
                    <label for="confirmPassword" class="mb-1 block text-sm font-semibold text-slate-700">Confirm Password</label>
                    <input id="confirmPassword" name="confirmPassword" type="password" required="required" class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <button type="submit" class="rounded-xl border border-amber-300 bg-amber-50 px-4 py-2 text-sm font-semibold text-amber-800 hover:bg-amber-100">Update Password</button>
            </form>
        </article>
    </section>
</main>
</body>
</html>
