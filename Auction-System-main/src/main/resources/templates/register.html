<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | The Digital Curator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="crossorigin" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet" />
    <style>
        body {
            font-family: Inter, sans-serif;
            background:
                radial-gradient(circle at 5% -12%, #dbeafe 0%, #dbeafe00 40%),
                radial-gradient(circle at 95% -14%, #fde68a 0%, #fde68a00 35%),
                #f5f8ff;
        }
        .font-display { font-family: "Space Grotesk", sans-serif; }
    </style>
</head>
<body class="min-h-screen text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-5xl items-center px-4 py-10 sm:px-6 lg:px-8">
        <section class="w-full rounded-3xl border border-slate-200 bg-white p-8 shadow-xl sm:p-10">
            <div class="mb-6 text-center">
                <p class="font-display text-3xl font-bold tracking-tight">The Digital Curator</p>
                <h1 class="mt-3 font-display text-2xl font-bold">Create Your Account</h1>
                <p class="mt-1 text-sm text-slate-500">Start bidding or selling in minutes.</p>
            </div>

            <div th:if="${error}" class="mb-5 rounded-xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm font-semibold text-rose-800" th:text="${error}"></div>

            <form method="post" action="/register" class="grid gap-4 sm:grid-cols-2">
                <div>
                    <label for="username" class="mb-1 block text-sm font-semibold text-slate-700">Username</label>
                    <input id="username" name="username" type="text" required="required" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <div>
                    <label for="email" class="mb-1 block text-sm font-semibold text-slate-700">Email</label>
                    <input id="email" name="email" type="email" required="required" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <div class="sm:col-span-2">
                    <label for="fullName" class="mb-1 block text-sm font-semibold text-slate-700">Full Name</label>
                    <input id="fullName" name="fullName" type="text" required="required" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <div>
                    <label for="password" class="mb-1 block text-sm font-semibold text-slate-700">Password</label>
                    <input id="password" name="password" type="password" required="required" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <div>
                    <label for="phoneNumber" class="mb-1 block text-sm font-semibold text-slate-700">Phone Number</label>
                    <input id="phoneNumber" name="phoneNumber" type="tel" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring" />
                </div>
                <div class="sm:col-span-2">
                    <label for="role" class="mb-1 block text-sm font-semibold text-slate-700">Account Type</label>
                    <select id="role" name="role" required="required" class="w-full rounded-xl border border-slate-300 bg-white px-3 py-2.5 text-sm outline-none ring-blue-200 transition focus:border-blue-500 focus:ring">
                        <option value="">Select account type</option>
                        <option value="buyer">Buyer</option>
                        <option value="seller">Seller</option>
                    </select>
                </div>
                <div class="sm:col-span-2 mt-2">
                    <button type="submit" class="w-full rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-700">Create Account</button>
                </div>
            </form>

            <p class="mt-5 text-center text-sm text-slate-600">
                Already registered?
                <a href="/login" class="font-semibold text-blue-700 hover:underline">Sign in</a>
            </p>
        </section>
    </main>
</body>
</html>
